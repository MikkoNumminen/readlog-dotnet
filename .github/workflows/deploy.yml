name: Deploy

# Manual-only by design. Deployment is an explicit human action (the standing rule
# is "do not deploy without the owner's go-ahead"), so there is no push trigger:
# you run this from the Actions tab, and the `production` environment gate below
# can require a reviewer before the Azure step runs. See docs/DEPLOY.md.
on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you deploying? (shows in the run log)"
        required: false
        default: "manual deploy"

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  # ghcr image path must be lowercase and a valid reference, so it is NOT derived
  # from ${{ github.repository }} (that slug contains '.' / '-' that break the grammar).
  IMAGE: ghcr.io/mikkonumminen/readlog

jobs:
  build-and-push:
    name: Build & push image to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to ghcr.io
    outputs:
      image: ${{ steps.ref.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Expose the immutable image ref
        id: ref
        run: echo "image=${{ env.IMAGE }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to Azure App Service
    needs: build-and-push
    runs-on: ubuntu-latest
    # The `production` GitHub Environment is the deploy gate: add a required reviewer
    # to it so every run pauses here for approval (enforces the no-unauthorized-deploy
    # rule technically, not just by convention). Also where Azure secrets are scoped.
    environment:
      name: production
      url: ${{ steps.deploy.outputs.webapp-url }}
    permissions:
      id-token: write # OIDC token for azure/login (no long-lived secret stored)
      contents: read
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy container to App Service
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          images: ${{ needs.build-and-push.outputs.image }}
